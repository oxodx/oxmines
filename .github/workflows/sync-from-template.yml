name: Sync changes from template

on:
  schedule:
    - cron: "17 5 * * 5"
  push:
    paths:
      - .github/workflows/sync-from-template.yml
  workflow_dispatch:

env:
  BASE_BRANCH: main
  HEAD_BRANCH: chore/sync-from-template
  GIT_AUTHOR_NAME: ${{ github.repository_owner }}
  GIT_AUTHOR_EMAIL: ${{ github.repository_owner }}@users.noreply.github.com
  REPO_TEMPLATE: oxodx/plugin-template
  THIS_REPO: ${{ github.repository }}

jobs:
  sync-from-template:
    if: github.repository != 'oxodx/plugin-template'
    name: Sync changes from oxodx/plugin-template
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out template repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_TEMPLATE }}
          token: ${{ github.token }}
          path: ${{ env.REPO_TEMPLATE }}
      - name: Check out ${{ github.repository }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ github.token }}
          path: ${{ github.repository }}
      - name: Create branch in ${{ env.THIS_REPO }}
        run: |
          git -C "${THIS_REPO}" fetch origin "${HEAD_BRANCH}" || true
          git -C "${THIS_REPO}" branch -a
          git -C "${THIS_REPO}" checkout -B "${HEAD_BRANCH}" \
            "remotes/origin/${HEAD_BRANCH}" || \
          git -C "${THIS_REPO}" checkout -b "${HEAD_BRANCH}"
      - name: Copy template contents (with true .gitignore matching)
        run: |
          TEMPLATE_ABS="$GITHUB_WORKSPACE/${REPO_TEMPLATE}"
          TARGET_ABS="$GITHUB_WORKSPACE/${THIS_REPO}"
          IGNORE_FILE="$TARGET_ABS/.templateignore"

          SANDBOX="/tmp/git_sandbox"
          mkdir -p "$SANDBOX"
          cd "$SANDBOX"

          git init -q

          if [ -f "$IGNORE_FILE" ]; then
            cat "$IGNORE_FILE" >> .gitignore
          fi

          cd "$TEMPLATE_ABS"
          find * -type f 2>/dev/null | while read -r clean_file; do

            cd "$SANDBOX"

            SKIP=0
            IFS='/' read -r -a parts <<< "$clean_file"
            current_path=""

            for ((i=0; i<${#parts[@]}-1; i++)); do
              current_path="${current_path}/${parts[i]}"
              if git check-ignore --quiet -d "${current_path}/" 2>/dev/null; then
                echo "INFO: Skipping ignored directory: ${current_path}/"
                SKIP=1
                break
              fi
            done

            if [ $SKIP -eq 1 ]; then
              continue
            fi

            if git check-ignore --quiet "/$clean_file" 2>/dev/null; then
              echo "INFO: Skipping ignored file: /$clean_file"
              continue
            fi

            _src="$TEMPLATE_ABS/$clean_file"
            _dst="$TARGET_ABS/$clean_file"

            mkdir -p "$(dirname "$_dst")"
            echo "INFO: Copying '${clean_file}'"
            cp "$_src" "$_dst"
          done

          git -C "$TARGET_ABS" diff
      - name: Commit changes, if any
        run: |
          git -C ${THIS_REPO} config user.name "${GIT_AUTHOR_NAME}"
          git -C ${THIS_REPO} config user.email "${GIT_AUTHOR_EMAIL}"
          git -C ${THIS_REPO} add .
          git -C ${THIS_REPO} diff-index --quiet HEAD || git -C ${THIS_REPO} commit -m "Sync from template@${{ github.sha }}"
      - name: Push topic branch
        run: git -C ${THIS_REPO} push -u origin "${HEAD_BRANCH}"
      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          pushd ${THIS_REPO}
          gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${HEAD_BRANCH}" \
            --title "chore: pull updates from ${REPO_TEMPLATE}" \
            --body "Automated PR syncing the latest non-workflow changes from the template repository." \
            || echo "PR already exists or no changes to push"
          popd
